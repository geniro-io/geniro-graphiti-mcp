# Local Neo4j for the Geniro Graphiti MCP server.
# The MCP server itself runs on the host (stdio) — only the database is
# containerized here. Start with:  docker compose up -d
services:
  neo4j:
    image: neo4j:5.26
    container_name: geniro-graphiti-neo4j
    ports:
      - "7474:7474"   # HTTP browser (http://localhost:7474)
      - "7687:7687"   # Bolt (used by NEO4J_URI=bolt://localhost:7687)
    environment:
      # Must match NEO4J_USER / NEO4J_PASSWORD in your .env.
      NEO4J_AUTH: neo4j/demodemo
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
